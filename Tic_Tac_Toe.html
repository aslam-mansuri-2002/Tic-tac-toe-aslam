<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="Tic_Tac_Toe.css">
</head>

<body>
    <!-- heading -->
    <h1 class="heading">Tic tac toe</h1>
    <p class="rules" style="text-align: center; margin-bottom: 20px; padding: 0 10px;">Pehle 3 symbols ('X' ya 'O') ko
        ek line mein (seedha, khada, ya diagonal)<br> laane wala player jeet jayega!</p>
    <!-- main div -->
    <div id="main-div">
        <!-- box jime X and O hoge -->
        <div id="big-box">
            <div class="small-box" data-index="0"></div>
            <div class="small-box" data-index="1"></div>
            <div class="small-box" data-index="2"></div>
            <div class="small-box" data-index="3"></div>
            <div class="small-box" data-index="4"></div>
            <div class="small-box" data-index="5"></div>
            <div class="small-box" data-index="6"></div>
            <div class="small-box" data-index="7"></div>
            <div class="small-box" data-index="8"></div>
        </div>
        <!-- game ke other thinks -->
        <div id="game-controler">
            <div class="control-row">
                <button class="start-btn">Start</button>
                <h2 class="status">Player X's Turn</h2>
                <button class="all-clear-btn">All Clear</button>
            </div>
            <!-- winner ya draw dikhane ke liye -->
            <h1 class="result">...</h1>
        </div>


    </div>



    <script src="Tic_Tac_Toe.js"></script>
</body>

</html>
